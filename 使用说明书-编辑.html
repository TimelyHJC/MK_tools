<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MK-tool 使用说明书 - 后台编辑</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; overflow: hidden; height: 100%; }
    body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #1a1a2e; color: #eee; }
    .layout {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100vh;
      background: #16213e;
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid #0f3460;
      z-index: 10;
      flex-shrink: 0;
    }
    .layout-content {
      margin-left: 220px;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }
    .sidebar h3 { margin: 0 0 12px; font-size: 14px; color: #e94560; }
    .sidebar button {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 8px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #0f3460;
      color: #eee;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      transition: background 0.2s;
    }
    .sidebar button:hover { background: #1a4a6e; }
    .sidebar button.active { background: #e94560; border-color: #e94560; }
    .section-item {
      padding: 8px 12px;
      margin-bottom: 4px;
      background: #0f3460;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #a0aec0;
      border: 1px solid transparent;
    }
    .section-item:hover { background: #1a4a6e; color: #fff; }
    .section-item.active { background: #e94560; color: #fff; border-color: #e94560; }
    .main {
      padding: 20px;
      overflow-y: auto;
      min-height: 0;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      background: #e94560;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar label:hover { opacity: 0.9; }
    .toolbar label input[type="file"] { display: none; }
    .toolbar button {
      padding: 8px 14px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #0f3460;
      color: #eee;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { background: #1a4a6e; }
    .toolbar button.primary { background: #e94560; border-color: #e94560; }
    .editor-panel {
      background: #16213e;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #0f3460;
      height: 100%;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }
    .editor-panel.visible { display: flex; flex-direction: column; }
    .editor-panel .editor-fixed {
      flex-shrink: 0;
      padding-bottom: 12px;
      border-bottom: 1px solid #0f3460;
      margin-bottom: 12px;
      background: #16213e;
      z-index: 5;
    }
    .editor-panel .field { margin-bottom: 16px; }
    .editor-panel .editor-fixed .field { margin-bottom: 12px; }
    .editor-panel .editor-fixed .field:last-child { margin-bottom: 0; }
    .editor-panel .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #a0aec0;
    }
    .editor-panel input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #0f3460;
      color: #eee;
      font-size: 14px;
      box-sizing: border-box;
    }
    .editor-panel .content-editor {
      flex: 1;
      min-height: 200px;
      padding: 12px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #0f3460;
      color: #eee;
      font-size: 14px;
      line-height: 1.6;
      overflow-y: auto;
      outline: none;
    }
    .editor-panel .content-editor:empty::before { content: "在此编辑正文内容..."; color: #6b7280; }
    .editor-panel .content-editor img,
    .editor-panel .content-editor figure img {
      max-width: 100%;
      border-radius: 6px;
      display: block;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15), 0 4px 24px rgba(0,0,0,0.12);
    }
    .editor-panel .img-actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .editor-panel .img-actions label, .editor-panel .img-actions button {
      padding: 8px 14px;
      min-width: 100px;
      height: 34px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .editor-panel .img-actions button.img-btn-ghost { background: #0f3460; color: #a0aec0; }
    .editor-panel .img-actions button.format-brush-active { background: #059669; color: #fff; }
    .editor-panel .img-actions label:hover, .editor-panel .img-actions button:hover { opacity: 0.9; }
    .editor-panel .img-actions label { cursor: pointer; line-height: 1; border: none; margin: 0; }
    .editor-panel .img-actions label input { display: none; }
    .editor-panel .content-editor img { cursor: pointer; }
    .editor-panel .content-editor img.selected { outline: 2px solid #e94560; outline-offset: 2px; }
    .editor-empty {
      padding: 60px 20px;
      text-align: center;
      color: #6b7280;
      font-size: 15px;
    }
    .editor-empty p { margin: 0 0 16px; }
    .preview-panel {
      background: #16213e;
      padding: 16px;
      border-right: 1px solid #0f3460;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .preview-panel .preview-wrapper {
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }
    .preview-panel h3 { margin: 0 0 12px; font-size: 14px; color: #e94560; }
    .preview-frame {
      width: 100%;
      height: 100%;
      min-height: 200px;
      border: 1px solid #0f3460;
      border-radius: 8px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h3>操作</h3>
      <label>
        <input type="file" id="importFile" accept=".html" />
        导入 使用说明书.html
      </label>
      <button type="button" id="btnExport" disabled>导出 HTML</button>
      <button type="button" id="btnSaveJson">保存为 JSON</button>
      <label style="margin-top:16px;display:block;">
        <input type="file" id="loadJsonFile" accept=".json" />
        从 JSON 加载
      </label>
      <h3 style="margin-top:20px;">章节</h3>
      <div id="sectionList"></div>
    </aside>
    <div class="layout-content">
    <aside class="preview-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-shrink:0;">
        <h3 style="margin:0;">预览</h3>
        <button type="button" id="btnRefreshPreview" style="padding:4px 10px;font-size:12px;border:1px solid #0f3460;border-radius:6px;background:#0f3460;color:#eee;cursor:pointer;">刷新预览</button>
      </div>
      <div class="preview-wrapper">
        <iframe id="previewFrame" class="preview-frame" sandbox="allow-same-origin"></iframe>
      </div>
    </aside>
    <main class="main">
      <div class="editor-empty" id="editorEmpty">
        <p>请先「导入 使用说明书.html」或「从 JSON 加载」</p>
        <p style="font-size:13px;">导入后可选择左侧章节进行编辑，支持修改文字和插入图片。</p>
      </div>
      <div class="editor-panel" id="editorPanel">
        <div class="editor-fixed">
          <div class="field">
            <label>章节标题</label>
            <input type="text" id="sectionTitle" placeholder="如：一、扩展介绍" />
          </div>
          <div class="field">
            <label>正文内容（支持 HTML）</label>
            <div class="img-actions">
              <label>
                <input type="file" id="imgInput" accept="image/*" />
                插入图片
              </label>
              <button type="button" id="btnInsertAtH3">在章节下方插入</button>
              <button type="button" id="btnReplaceImg" class="img-btn-ghost" disabled title="先点击正文中的图片选中，再点此替换">替换所选图片</button>
              <button type="button" id="btnDeleteImg" class="img-btn-ghost" disabled title="先点击正文中的图片选中，再点此删除">删除图片</button>
              <input type="file" id="imgReplaceInput" accept="image/*" style="display:none;" />
              <button type="button" id="btnDeleteRow" class="img-btn-ghost">删除当前行</button>
              <button type="button" id="btnFormatBrush" class="img-btn-ghost" title="选择源文字点击拾取，选择目标文字点击应用；Ctrl+点击可重新拾取新格式">格式刷</button>
            </div>
          </div>
        </div>
        <div class="content-editor" id="contentEditor" contenteditable="true"></div>
      </div>
    </main>
    </div>
  </div>

  <script>
(function() {
  var sections = [];
  var selectedIndex = -1;
  var templateHead = '';
  var templateToc = '';
  var templateFooter = '';
  var templateScript = '';

  var importFile = document.getElementById('importFile');
  var loadJsonFile = document.getElementById('loadJsonFile');
  var btnExport = document.getElementById('btnExport');
  var btnSaveJson = document.getElementById('btnSaveJson');
  var sectionList = document.getElementById('sectionList');
  var editorEmpty = document.getElementById('editorEmpty');
  var editorPanel = document.getElementById('editorPanel');
  var sectionTitle = document.getElementById('sectionTitle');
  var contentEditor = document.getElementById('contentEditor');
  var imgInput = document.getElementById('imgInput');
  var imgReplaceInput = document.getElementById('imgReplaceInput');
  var previewFrame = document.getElementById('previewFrame');
  var mainPanel = document.querySelector('.main');
  var selectedImg = null;

  function parseHtml(html) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');
    var styleEl = doc.querySelector('head style');
    templateHead = styleEl ? '<style>' + styleEl.innerHTML + '</style>' : '';

    var body = doc.body;
    var toc = body.querySelector('.toc-sidebar');
    templateToc = toc ? toc.outerHTML : '';

    var container = body.querySelector('.container');
    if (!container) return;

    var header = container.querySelector('header');
    var headerHtml = header ? header.outerHTML : '';

    var commentsSection = container.querySelector('#comments-section');
    templateFooter = commentsSection ? commentsSection.outerHTML : '';

    var scr = body.querySelector('script');
    templateScript = scr ? scr.outerHTML : '';

    var secs = container.querySelectorAll('section:not(#comments-section)');
    sections = [];
    secs.forEach(function(sec) {
      var h2 = sec.querySelector('h2');
      var id = h2 ? (h2.id || '') : '';
      var title = h2 ? h2.textContent.trim() : '';
      var content = sec.innerHTML;
      sections.push({ id: id, title: title, content: content });
    });

    renderSectionList();
    btnExport.disabled = sections.length === 0;
    editorEmpty.style.display = 'none';
    editorPanel.classList.add('visible');
    selectSection(0);
  }

  function renderSectionList() {
    sectionList.innerHTML = sections.map(function(s, i) {
      return '<div class="section-item" data-idx="' + i + '">' + (s.title || '（无标题）') + '</div>';
    }).join('');
    sectionList.querySelectorAll('.section-item').forEach(function(el) {
      el.onclick = function() { selectSection(parseInt(el.dataset.idx, 10)); };
    });
  }

  function selectSection(idx) {
    selectedIndex = idx;
    sectionList.querySelectorAll('.section-item').forEach(function(el, i) {
      el.classList.toggle('active', i === idx);
    });
    if (idx >= 0 && idx < sections.length) {
      var s = sections[idx];
      sectionTitle.value = s.title;
      contentEditor.innerHTML = s.content;
      selectedImg = null;
      document.getElementById('btnReplaceImg').disabled = true;
      document.getElementById('btnDeleteImg').disabled = true;
      var fb = document.getElementById('btnFormatBrush');
      if (fb) { fb.textContent = '格式刷'; fb.classList.remove('format-brush-active'); fb.title = '选择源文字点击拾取，选择目标文字点击应用；Ctrl+点击可重新拾取新格式'; }
      refreshPreview(idx);
    }
  }

  document.getElementById('btnDeleteImg').onclick = function() {
    if (!selectedImg) return;
    var fig = selectedImg.closest('figure');
    var parent = selectedImg.parentNode;
    if (fig && fig.parentNode) {
      fig.parentNode.removeChild(fig);
    } else if (parent) {
      parent.removeChild(selectedImg);
    }
    selectedImg = null;
    document.getElementById('btnReplaceImg').disabled = true;
    document.getElementById('btnDeleteImg').disabled = true;
    saveCurrentSection();
  };

  function saveCurrentSection() {
    if (selectedIndex >= 0 && selectedIndex < sections.length) {
      sections[selectedIndex].title = sectionTitle.value.trim();
      sections[selectedIndex].content = contentEditor.innerHTML;
    }
  }

  sectionTitle.addEventListener('blur', function() {
    saveCurrentSection();
    syncTitleToContent();
  });
  sectionTitle.addEventListener('input', function() {
    if (selectedIndex >= 0) {
      sections[selectedIndex].title = sectionTitle.value;
      var el = sectionList.children[selectedIndex];
      if (el) el.textContent = sectionTitle.value || '（无标题）';
    }
  });

  function syncTitleToContent() {
    var div = document.createElement('div');
    div.innerHTML = contentEditor.innerHTML;
    var h2 = div.querySelector('h2');
    if (h2 && sectionTitle.value) {
      h2.textContent = sectionTitle.value;
      contentEditor.innerHTML = div.innerHTML;
      if (selectedIndex >= 0) sections[selectedIndex].content = contentEditor.innerHTML;
    }
  }
  contentEditor.addEventListener('blur', saveCurrentSection);

  function insertImageAt(srcData, alt) {
    contentEditor.focus();
    var fig = document.createElement('figure');
    var img = document.createElement('img');
    img.src = srcData;
    img.alt = alt || '';
    fig.appendChild(img);
    try {
      document.execCommand('insertHTML', false, fig.outerHTML);
    } catch (e) {
      contentEditor.appendChild(fig);
    }
    saveCurrentSection();
  }

  imgInput.addEventListener('change', function() {
    var f = this.files[0];
    if (!f || !f.type.startsWith('image/')) return;
    var r = new FileReader();
    r.onload = function() { insertImageAt(r.result, f.name); };
    r.readAsDataURL(f);
    this.value = '';
  });

  contentEditor.addEventListener('click', function(e) {
    var img = e.target.closest('img');
    if (img) {
      contentEditor.querySelectorAll('img.selected').forEach(function(x) { x.classList.remove('selected'); });
      img.classList.add('selected');
      selectedImg = img;
      document.getElementById('btnReplaceImg').disabled = false;
      document.getElementById('btnDeleteImg').disabled = false;
    } else {
      selectedImg = null;
      document.getElementById('btnReplaceImg').disabled = true;
      document.getElementById('btnDeleteImg').disabled = true;
    }
  });

  imgReplaceInput.addEventListener('change', function() {
    var f = this.files[0];
    if (!f || !f.type.startsWith('image/') || !selectedImg) return;
    var r = new FileReader();
    r.onload = function() {
      selectedImg.src = r.result;
      selectedImg.alt = f.name;
      saveCurrentSection();
    };
    r.readAsDataURL(f);
    this.value = '';
  });

  document.getElementById('btnReplaceImg').onclick = function() {
    if (selectedImg) imgReplaceInput.click();
  };

  var formatBrushFormat = null;

  function getFormatFromSelection() {
    var sel = window.getSelection();
    if (!sel.rangeCount) return null;
    var range = sel.getRangeAt(0);
    if (!contentEditor.contains(range.commonAncestorContainer)) return null;
    if (range.collapsed) return null;
    contentEditor.focus();
    var fmt = {
      bold: document.queryCommandState('bold'),
      italic: document.queryCommandState('italic'),
      underline: document.queryCommandState('underline'),
      strikethrough: document.queryCommandState('strikeThrough'),
      formatBlock: (document.queryCommandValue('formatBlock') || 'p').toLowerCase()
    };
    var node = range.startContainer;
    var el = node.nodeType === 3 ? node.parentElement : node;
    while (el && el !== contentEditor) {
      if (el.nodeType === 1) {
        var tag = (el.tagName || '').toUpperCase();
        if (['H2','H3','H4','P','DIV'].indexOf(tag) >= 0) {
          fmt.formatBlock = tag.toLowerCase();
          break;
        }
      }
      el = el.parentElement;
    }
    el = range.startContainer.nodeType === 3 ? range.startContainer.parentElement : range.startContainer;
    if (el && el.nodeType === 1) {
      var cs = window.getComputedStyle(el);
      fmt.color = cs.color;
      fmt.fontSize = cs.fontSize;
      fmt.fontWeight = cs.fontWeight;
    }
    return fmt;
  }

  function applyFormatToSelection(fmt) {
    if (!fmt) return false;
    var sel = window.getSelection();
    if (!sel.rangeCount) return false;
    var range = sel.getRangeAt(0);
    if (!contentEditor.contains(range.commonAncestorContainer)) return false;
    if (range.collapsed) return false;
    contentEditor.focus();
    var txt = range.toString();
    if (!txt) return true;
    var div = document.createElement('div');
    div.textContent = txt;
    var escaped = div.innerHTML;
    var inner = escaped;
    if (fmt.bold) inner = '<strong>' + inner + '</strong>';
    if (fmt.italic) inner = '<em>' + inner + '</em>';
    if (fmt.underline) inner = '<u>' + inner + '</u>';
    if (fmt.strikethrough) inner = '<s>' + inner + '</s>';
    var styleParts = [];
    if (fmt.color) styleParts.push('color:' + fmt.color);
    if (fmt.fontSize) styleParts.push('font-size:' + fmt.fontSize);
    if (styleParts.length) inner = '<span style="' + styleParts.join(';') + '">' + inner + '</span>';
    try {
      range.deleteContents();
      document.execCommand('insertHTML', false, inner);
      document.execCommand('formatBlock', false, fmt.formatBlock);
      return true;
    } catch (e) { return false; }
  }

  document.getElementById('btnFormatBrush').addEventListener('mousedown', function(ev) {
    ev.preventDefault();
    if (contentEditor !== document.activeElement && !contentEditor.contains(document.activeElement)) {
      contentEditor.focus();
    }
    var sel = window.getSelection();
    var hasRange = sel.rangeCount && sel.getRangeAt(0);
    var inEditor = hasRange && contentEditor.contains(sel.getRangeAt(0).commonAncestorContainer);
    var collapsed = hasRange && sel.getRangeAt(0).collapsed;
    var forceRePick = ev.ctrlKey || ev.metaKey;
    if (forceRePick && inEditor && !collapsed) {
      formatBrushFormat = getFormatFromSelection();
      if (formatBrushFormat) {
        this.title = '已重新拾取格式（Ctrl+点击可随时重新拾取）。请选择目标文字后点击应用';
        this.classList.add('format-brush-active');
        this.textContent = '格式刷 ✓';
      }
      return;
    }
    if (formatBrushFormat && inEditor && !collapsed && !forceRePick) {
      if (applyFormatToSelection(formatBrushFormat)) {
        saveCurrentSection();
        this.title = '格式已应用。选择目标文字可再次应用；选择源文字后 Ctrl+点击 可重新拾取';
      }
      return;
    }
    if (inEditor && !collapsed) {
      formatBrushFormat = getFormatFromSelection();
      if (formatBrushFormat) {
        this.title = '已拾取格式。选择目标文字后点击应用；选择新源文字后 Ctrl+点击 可重新拾取';
        this.classList.add('format-brush-active');
        this.textContent = '格式刷 ✓';
      }
    } else {
      alert('请先在正文中选择要拾取格式的文字，或选择要应用格式的目标文字。\n提示：按住 Ctrl 点击可重新拾取新格式。');
    }
  });

  document.getElementById('btnDeleteRow').onclick = function() {
    var sel = window.getSelection();
    var range = sel.rangeCount ? sel.getRangeAt(0) : null;
    if (!range) return;
    var node = range.startContainer;
    while (node && node !== contentEditor) {
      if (node.nodeType === 1) {
        var tag = (node.tagName || '').toUpperCase();
        if (['P','DIV','LI','H3','H4','TR','BLOCKQUOTE'].indexOf(tag) >= 0 || (tag === 'SECTION' && node !== contentEditor)) {
          node.parentNode.removeChild(node);
          saveCurrentSection();
          return;
        }
      }
      node = node.parentNode;
    }
    if (range.commonAncestorContainer && range.commonAncestorContainer.parentNode) {
      var block = range.commonAncestorContainer.nodeType === 3 ? range.commonAncestorContainer.parentNode : range.commonAncestorContainer;
      if (block && block.parentNode && block !== contentEditor) {
        block.parentNode.removeChild(block);
        saveCurrentSection();
      }
    }
  };

  document.getElementById('btnInsertAtH3').onclick = function() {
    var h3s = contentEditor.querySelectorAll('h3');
    if (h3s.length === 0) { alert('当前章节无小标题（h3），请先在正文中使用 h3 或直接使用「插入图片」'); return; }
    var opts = Array.from(h3s).map(function(h, i) { return (i+1) + '. ' + (h.textContent || '').trim().slice(0, 24); });
    var choice = prompt('在哪个小章节下方插入图片？输入序号 1-' + h3s.length + '\n\n' + opts.join('\n'));
    if (!choice) return;
    var idx = parseInt(choice, 10) - 1;
    if (isNaN(idx) || idx < 0 || idx >= h3s.length) return;
    var targetH3 = h3s[idx];
    var fakeInput = document.createElement('input');
    fakeInput.type = 'file';
    fakeInput.accept = 'image/*';
    fakeInput.onchange = function() {
      var f = this.files[0];
      if (!f || !f.type.startsWith('image/')) return;
      var r = new FileReader();
      r.onload = function() {
        var fig = document.createElement('figure');
        var img = document.createElement('img');
        img.src = r.result;
        img.alt = f.name;
        fig.appendChild(img);
        var next = targetH3.nextElementSibling;
        if (next) targetH3.parentNode.insertBefore(fig, next);
        else targetH3.parentNode.appendChild(fig);
        saveCurrentSection();
      };
      r.readAsDataURL(f);
    };
    fakeInput.click();
  };

  importFile.addEventListener('change', function() {
    var f = this.files[0];
    if (!f) return;
    var r = new FileReader();
    r.onload = function() { parseHtml(r.result); };
    r.readAsText(f, 'UTF-8');
    this.value = '';
  });

  function loadFromJson(obj) {
    if (obj && Array.isArray(obj.sections)) {
      sections = obj.sections;
      templateHead = obj.templateHead || '';
      templateToc = obj.templateToc || '';
      templateFooter = obj.templateFooter || '';
      templateScript = obj.templateScript || '';
    }
    renderSectionList();
    btnExport.disabled = sections.length === 0;
    editorEmpty.style.display = 'none';
    editorPanel.classList.add('visible');
    selectSection(0);
  }

  loadJsonFile.addEventListener('change', function() {
    var f = this.files[0];
    if (!f) return;
    var r = new FileReader();
    r.onload = function() {
      try {
        loadFromJson(JSON.parse(r.result));
      } catch (e) { alert('JSON 解析失败'); }
    };
    r.readAsText(f, 'UTF-8');
    this.value = '';
  });

  btnSaveJson.addEventListener('click', function() {
    saveCurrentSection();
    var blob = new Blob([JSON.stringify({
      sections: sections,
      templateHead: templateHead,
      templateToc: templateToc,
      templateFooter: templateFooter,
      templateScript: templateScript
    }, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '使用说明书-数据.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  btnExport.addEventListener('click', function() {
    saveCurrentSection();
    var html = buildHtml();
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '使用说明书.html';
    a.click();
    URL.revokeObjectURL(a.href);

    refreshPreview();
  });

  var previewNoScrollbarStyle = '<style id="preview-hide-scrollbar">html,body{scrollbar-width:none;-ms-overflow-style:none}html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}</style>';
  var imgShadowStyle = '<style id="img-shadow">section img,section figure img{max-width:100%;border-radius:6px;display:block;box-shadow:0 2px 12px rgba(0,0,0,0.1),0 4px 24px rgba(0,0,0,0.06)}</style>';

  var pendingScrollToIndex = -1;

  function refreshPreview(scrollToIndex) {
    if (sections.length > 0) {
      saveCurrentSection();
      pendingScrollToIndex = typeof scrollToIndex === 'number' ? scrollToIndex : -1;
      previewFrame.srcdoc = buildHtml(true);
    }
  }

  previewFrame.addEventListener('load', function() {
    if (pendingScrollToIndex >= 0) {
      var doc = previewFrame.contentDocument;
      var el = doc && doc.getElementById('section-' + pendingScrollToIndex);
      if (el) {
        el.scrollIntoView({ block: 'start', behavior: 'smooth' });
      }
      pendingScrollToIndex = -1;
    }
  });

  document.getElementById('btnRefreshPreview').onclick = function() { refreshPreview(); };

  function buildHtml(forPreview) {
    var secsHtml = sections.map(function(s, i) {
      return '<section id="section-' + i + '">\n  ' + s.content + '\n</section>';
    }).join('\n\n');
    var extraStyle = (forPreview ? previewNoScrollbarStyle : '') + imgShadowStyle;
    return '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n  <meta charset="UTF-8" />\n  <meta name="viewport" content="width=device-width, initial-scale=1.0" />\n  <title>MK-tool 使用说明书</title>\n  ' + extraStyle + '\n  ' + templateHead + '\n</head>\n<body>\n' + templateToc + '\n  <div class="container">\n    <header>\n      <h1>MK-tool 使用说明书</h1>\n      <p>面向门店项目管理的浏览器扩展 · 一键提取图片、CAD、视频等资料 · 三图资料下载 · 提取字段 · 钉钉表单同步</p>\n    </header>\n\n' + secsHtml + '\n\n' + templateFooter + '\n  </div>\n  ' + templateScript + '\n</body>\n</html>';
  }

  function escapeHtml(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

})();
  </script>
</body>
</html>
